<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>お問い合わせ | こもれび猫の間</title><meta name="description" content="猫カフェ予約、譲渡相談、アクセス確認のお問い合わせフォーム。"><link rel="icon" href="/favicon.svg"><link rel="stylesheet" href="/assets/styles.css"></head><body><header class="site-header" data-header></header><main><section class="page-hero"><p class="breadcrumb"><a href="/">HOME</a> / お問い合わせ</p><p class="eyebrow">Contact</p><h1 class="page-title">お問い合わせ</h1><p class="lead">ご予約、譲渡相談、道順の確認など、お気軽にご連絡ください。</p></section><section class="section split"><div><h2>送信前にご確認ください</h2><p>猫の体調や混雑状況により、ご希望日時に添えない場合があります。譲渡相談は、在籍猫の状況と相性を見ながら進めます。</p><p>FormspreeのURLを設定すると、Cloudflare Pages上でそのままフォーム送信できます。未設定のローカル確認時は完了メッセージのみ表示します。</p><div class="button-row"><a class="button ghost" href="/price-guide/">料金を見る</a><a class="button ghost" href="/access/">アクセスを見る</a></div></div><div class="contact-panel"><form action="https://formspree.io/f/example" method="POST" data-contact-form><label>お名前<input name="name" autocomplete="name" required></label><label>メールアドレス<input type="email" name="email" autocomplete="email" required></label><label>電話番号<input type="tel" name="tel" autocomplete="tel"></label><label>お問い合わせ種別<select name="type" required><option value="">選択してください</option><option>来店予約</option><option>譲渡について</option><option>保護猫受け入れ相談</option><option>アクセス・営業時間</option><option>その他</option></select></label><label>お問い合わせ内容<textarea name="message" required></textarea></label><button class="button" type="submit">送信する</button><p data-form-result aria-live="polite"></p></form></div></section></main><footer class="site-footer" data-footer></footer><script src="/assets/site.js"></script></body></html>
